<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320" font-family="Playfair Display, serif">
  <title>Purposefully Eating — Primary Wordmark</title>
  <!-- Primary line -->
  <text x="400" y="120" text-anchor="middle" font-size="72" font-weight="600" fill="#2B2A28" letter-spacing="-1">Purposefully</text>
  <text x="400" y="190" text-anchor="middle" font-size="72" font-weight="500" font-style="italic" fill="#C87F5A" letter-spacing="-1">Eating</text>
  <!-- Divider -->
  <line x1="370" y1="215" x2="430" y2="215" stroke="#C87F5A" stroke-width="2.5"/>
  <!-- Byline -->
  <text x="400" y="248" text-anchor="middle" font-size="22" font-style="italic" fill="#6B4E32" font-family="Cormorant Garamond, serif" letter-spacing="0.5">with Phyllis Inman</text>
  <!-- Subtle institute -->
  <text x="400" y="282" text-anchor="middle" font-size="11" font-family="Inter, sans-serif" fill="#6F6B63" letter-spacing="5" font-weight="500">INMAN INSTITUTE</text>
</svg>
