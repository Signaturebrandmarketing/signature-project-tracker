  btn.addEventListener('click', (e) => {
    e.preventDefault();
    const section = document.getElementById(btn.dataset.section);
    const topics = section.querySelectorAll('.topic');
    const anyClosed = Array.from(topics).some(t => !t.classList.contains('open'));
    topics.forEach(t => t.classList.toggle('open', anyClosed));
    btn.textContent = anyClosed ? 'Collapse all' : 'Expand all';
  });
});

// Active section highlight on nav
const navLinks = document.querySelectorAll('[data-nav]');
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      navLinks.forEach(l => l.classList.toggle('active', l.dataset.nav === e.target.id));
    }
  });
}, { rootMargin: '-40% 0px -40% 0px' });
sections.forEach(s => {
  const el = document.getElementById(s.id);
  if (el) io.observe(el);
});
</script>
</body>
</html>
