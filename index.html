<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature Projects — Claude Tracker</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #a78bfa;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --orange: #fb923c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
  .header h1 span { color: var(--accent); }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Stats */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .stat:hover { border-color: var(--accent); transform: translateY(-1px); }
  .stat.active { border-color: var(--accent); background: rgba(167,139,250,0.08); }
  .stat-value { font-size: 1.6rem; font-weight: 700; line-height: 1; }
  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 0.85rem;
    border-radius: 8px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #0a0a0f; border-color: var(--accent); font-weight: 600; }

  /* Layout */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 1.5rem;
    align-items: start;
  }

  /* Project cards */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 1rem;
  }
  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.35rem;
    transition: border-color 0.2s, box-shadow 0.3s;
  }
  .project-card:hover { border-color: var(--accent); }
  .project-card.flash {
    animation: cardFlash 1.5s ease;
  }
  @keyframes cardFlash {
    0% { box-shadow: 0 0 0 2px var(--accent); }
    100% { box-shadow: none; }
  }
  .project-card.hidden { display: none; }
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }
  .card-top h2 { font-size: 0.95rem; font-weight: 600; line-height: 1.3; flex: 1; margin-right: 0.75rem; }
  .badge {
    font-size: 0.6rem;
    font-weight: 600;
    padding: 0.2rem 0.55rem;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-healthy { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-building { background: rgba(96,165,250,0.15); color: var(--blue); }
  .badge-needs-attention { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .badge-blocked { background: rgba(248,113,113,0.15); color: var(--red); }
  .badge-planned { background: rgba(113,113,122,0.15); color: var(--muted); }
  .card-desc { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.85rem; line-height: 1.4; }

  .modules { display: flex; flex-direction: column; gap: 0.3rem; }
  .module { display: flex; align-items: center; gap: 0.5rem; font-size: 0.76rem; padding: 0.3rem 0; }
  .module-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-complete { background: var(--green); }
  .dot-in-progress { background: var(--blue); }
  .dot-planned { background: var(--muted); }
  .dot-blocked { background: var(--red); }
  .module-name { flex: 1; }
  .module-note {
    font-size: 0.68rem;
    color: var(--muted);
    max-width: 170px;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .progress-bar { margin-top: 0.85rem; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .fill-green { background: var(--green); }
  .fill-blue { background: var(--blue); }
  .fill-yellow { background: var(--yellow); }
  .fill-red { background: var(--red); }
  .fill-gray { background: var(--muted); }

  .issues { margin-top: 0.65rem; display: flex; flex-direction: column; gap: 0.3rem; }
  .issue { font-size: 0.7rem; padding: 0.35rem 0.6rem; border-radius: 6px; line-height: 1.3; }
  .issue-critical { background: rgba(248,113,113,0.1); color: var(--red); }
  .issue-warning { background: rgba(251,191,36,0.1); color: var(--yellow); }

  .card-footer {
    margin-top: 0.85rem;
    padding-top: 0.65rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.68rem;
    color: var(--muted);
  }

  /* Timeline */
  .timeline-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    position: sticky;
    top: 2rem;
    max-height: calc(100vh - 4rem);
    overflow-y: auto;
  }
  .timeline-panel::-webkit-scrollbar { width: 4px; }
  .timeline-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .timeline-title {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .timeline-title::before {
    content: '';
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }
  .tl-item {
    position: relative;
    padding-left: 1.25rem;
    padding-bottom: 1rem;
    border-left: 1px solid var(--border);
    margin-left: 4px;
  }
  .tl-item:last-child { padding-bottom: 0; border-left-color: transparent; }
  .tl-dot {
    position: absolute;
    left: -4.5px;
    top: 3px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .tl-dot-launch { background: var(--green); }
  .tl-dot-milestone { background: var(--accent); }
  .tl-dot-decision { background: var(--blue); }
  .tl-dot-fix { background: var(--yellow); }
  .tl-dot-blocker { background: var(--red); }
  .tl-date { font-size: 0.65rem; color: var(--muted); margin-bottom: 0.15rem; }
  .tl-event { font-size: 0.75rem; line-height: 1.35; }
  .tl-project { font-size: 0.65rem; color: var(--accent); margin-top: 0.1rem; }

  /* Toast notification */
  .toast {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 0.85rem 1.15rem;
    font-size: 0.8rem;
    z-index: 1000;
    transform: translateX(120%);
    transition: transform 0.3s ease;
    max-width: 320px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(0); }
  .toast-title { font-weight: 600; margin-bottom: 0.2rem; color: var(--accent); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }

  /* Footer */
  .last-updated {
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 860px) {
    .main-layout { grid-template-columns: 1fr; }
    .timeline-panel { position: static; max-height: none; order: -1; }
    .projects-grid { grid-template-columns: 1fr; }
    .stats-bar { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 480px) {
    body { padding: 1rem; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
  <div class="header">
    <h1><span>Signature</span> Project Tracker</h1>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="refresh-status">Live — 30s refresh</span>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>
  <div class="filter-bar" id="filter-bar"></div>

  <div class="main-layout">
    <div class="projects-grid" id="projects-grid"></div>
    <div class="timeline-panel" id="timeline-panel">
      <div class="timeline-title">Activity Timeline</div>
      <div id="timeline-list"></div>
    </div>
  </div>

  <div class="last-updated" id="last-updated"></div>
  <div class="toast" id="toast"><div class="toast-title">Updated</div><div id="toast-msg"></div></div>

<script>
const REFRESH_INTERVAL = 30000;
let currentFilter = 'all';
let prevHash = null;

const healthBadgeMap = {
  'healthy': 'badge-healthy', 'building': 'badge-building',
  'needs-attention': 'badge-needs-attention', 'blocked': 'badge-blocked', 'planned': 'badge-planned'
};
const dotMap = {
  'complete': 'dot-complete', 'in-progress': 'dot-in-progress',
  'planned': 'dot-planned', 'blocked': 'dot-blocked'
};
const fillMap = {
  'healthy': 'fill-green', 'building': 'fill-blue',
  'needs-attention': 'fill-yellow', 'blocked': 'fill-red', 'planned': 'fill-gray'
};
const tlDotMap = {
  'launch': 'tl-dot-launch', 'milestone': 'tl-dot-milestone',
  'decision': 'tl-dot-decision', 'fix': 'tl-dot-fix', 'blocker': 'tl-dot-blocker'
};

const filterDefs = [
  { key: 'all', label: 'All' },
  { key: 'healthy', label: 'Healthy', match: p => p.health === 'healthy' },
  { key: 'building', label: 'Building', match: p => p.health === 'building' || p.status === 'in-progress' },
  { key: 'needs-attention', label: 'Needs Attention', match: p => p.health === 'needs-attention' },
  { key: 'blocked', label: 'Blocked', match: p => p.health === 'blocked' },
  { key: 'planned', label: 'Planned', match: p => p.health === 'planned' },
  { key: 'has-issues', label: 'Has Issues', match: p => p.issues && p.issues.length > 0 }
];

function calcProgress(mods) {
  if (!mods || !mods.length) return 0;
  return Math.round(mods.filter(m => m.status === 'complete').length / mods.length * 100);
}

function timeAgo(d) {
  const days = Math.floor((new Date() - new Date(d)) / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  return days + 'd ago';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

function renderFilters() {
  document.getElementById('filter-bar').innerHTML = filterDefs.map(f =>
    `<button class="filter-btn${currentFilter === f.key ? ' active' : ''}" data-filter="${f.key}">${f.label}</button>`
  ).join('');
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      renderFilters();
      applyFilter();
    });
  });
}

function applyFilter() {
  document.querySelectorAll('.project-card').forEach(card => {
    if (currentFilter === 'all') {
      card.classList.remove('hidden');
    } else {
      const fd = filterDefs.find(f => f.key === currentFilter);
      const pid = card.dataset.id;
      const proj = window._lastData?.projects.find(p => p.id === pid);
      if (proj && fd?.match) {
        card.classList.toggle('hidden', !fd.match(proj));
      } else {
        card.classList.remove('hidden');
      }
    }
  });
}

function render(data) {
  window._lastData = data;
  const projects = data.projects;

  const total = projects.length;
  const active = projects.filter(p => p.status === 'active').length;
  const building = projects.filter(p => p.status === 'in-progress' || p.health === 'building').length;
  const blocked = projects.filter(p => p.health === 'blocked').length;
  const attention = projects.filter(p => p.health === 'needs-attention').length;
  const totalMods = projects.reduce((s, p) => s + (p.modules?.length || 0), 0);
  const doneMods = projects.reduce((s, p) => s + (p.modules?.filter(m => m.status === 'complete').length || 0), 0);

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--green)">${active}</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--blue)">${building}</div><div class="stat-label">Building</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--yellow)">${attention}</div><div class="stat-label">Attention</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--red)">${blocked}</div><div class="stat-label">Blocked</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--accent)">${doneMods}/${totalMods}</div><div class="stat-label">Modules</div></div>
  `;

  document.getElementById('projects-grid').innerHTML = projects.map(p => {
    const pct = calcProgress(p.modules);
    return `
      <div class="project-card" data-id="${p.id}">
        <div class="card-top">
          <h2>${p.name}</h2>
          <span class="badge ${healthBadgeMap[p.health] || 'badge-planned'}">${(p.health || '').replace(/-/g, ' ')}</span>
        </div>
        <div class="card-desc">${p.description}</div>
        <div class="modules">
          ${(p.modules || []).map(m => `
            <div class="module">
              <div class="module-dot ${dotMap[m.status] || 'dot-planned'}"></div>
              <div class="module-name">${m.name}</div>
              <div class="module-note" title="${m.note || ''}">${m.note || ''}</div>
            </div>
          `).join('')}
        </div>
        <div class="progress-bar"><div class="progress-fill ${fillMap[p.health] || 'fill-gray'}" style="width:${pct}%"></div></div>
        ${(p.issues || []).length ? `<div class="issues">${p.issues.map(i =>
          `<div class="issue issue-${i.severity}">${i.text}</div>`
        ).join('')}</div>` : ''}
        <div class="card-footer">
          <span>${pct}% complete</span>
          <span>${timeAgo(p.lastActivity)}</span>
        </div>
      </div>
    `;
  }).join('');

  // Timeline
  const timeline = (data.timeline || []).sort((a, b) => new Date(b.date) - new Date(a.date));
  document.getElementById('timeline-list').innerHTML = timeline.map(t => `
    <div class="tl-item">
      <div class="tl-dot ${tlDotMap[t.type] || 'tl-dot-milestone'}"></div>
      <div class="tl-date">${new Date(t.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
      <div class="tl-event">${t.event}</div>
    </div>
  `).join('');

  const updated = new Date(data.lastUpdated);
  document.getElementById('last-updated').textContent =
    `Last updated by ${data.updatedBy} \u2014 ${updated.toLocaleString()}`;

  applyFilter();
}

async function loadData() {
  try {
    const res = await fetch('projects.json?' + Date.now());
    const data = await res.json();
    const hash = JSON.stringify(data);
    if (prevHash && hash !== prevHash) {
      showToast('Dashboard updated \u2014 new changes detected');
      // Flash changed cards
      setTimeout(() => {
        document.querySelectorAll('.project-card').forEach(c => {
          c.classList.add('flash');
          setTimeout(() => c.classList.remove('flash'), 1500);
        });
      }, 100);
    }
    prevHash = hash;
    render(data);
  } catch (e) {
    console.error('Load failed:', e);
  }
}

renderFilters();
loadData();
setInterval(loadData, REFRESH_INTERVAL);
</script>
</body>
</html>
