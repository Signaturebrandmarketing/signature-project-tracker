<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature Projects — Claude Tracker</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #a78bfa;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --orange: #fb923c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
  .header h1 span { color: var(--accent); }
  .live-badge { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--muted); }
  .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* HERO SCORE */
  .hero-score {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 2rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  .score-ring {
    position: relative;
    width: 120px;
    height: 120px;
    flex-shrink: 0;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  .score-ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s ease, stroke 0.5s ease; }
  .score-number {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .score-number .value { font-size: 2.2rem; font-weight: 800; line-height: 1; }
  .score-number .label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.15rem; }
  .score-details { flex: 1; min-width: 0; }
  .score-details h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
  .score-breakdown {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .breakdown-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
  }
  .bd-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .bd-count { font-weight: 700; min-width: 14px; }
  .target-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.5rem;
  }
  .target-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 6px;
    position: relative;
    overflow: visible;
  }
  .target-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 1s ease;
  }
  .target-marker {
    position: absolute;
    top: -3px;
    height: 12px;
    width: 2px;
    background: var(--text);
    border-radius: 1px;
    transition: left 0.5s;
  }
  .target-label { font-size: 0.65rem; color: var(--muted); white-space: nowrap; }

  /* PRIORITY LIST */
  .priority-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .priority-title {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .priority-title::before { content: ''; width: 3px; height: 14px; background: var(--orange); border-radius: 2px; }
  .priority-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .priority-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.78rem;
    padding: 0.6rem 0.75rem;
    background: rgba(251,146,60,0.05);
    border: 1px solid rgba(251,146,60,0.12);
    border-radius: 8px;
  }
  .priority-rank {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .rank-1 { background: rgba(248,113,113,0.2); color: var(--red); }
  .rank-2 { background: rgba(251,191,36,0.2); color: var(--yellow); }
  .rank-3 { background: rgba(251,146,60,0.2); color: var(--orange); }
  .rank-4 { background: rgba(96,165,250,0.2); color: var(--blue); }
  .rank-5 { background: rgba(167,139,250,0.2); color: var(--accent); }
  .priority-text { flex: 1; line-height: 1.35; }
  .priority-impact {
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--green);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* STATS */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    text-align: center;
  }
  .stat-value { font-size: 1.6rem; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; text-transform: uppercase; letter-spacing: 0.05em; }

  /* FILTERS */
  .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 0.4rem 0.85rem; border-radius: 8px; font-size: 0.75rem;
    cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #0a0a0f; border-color: var(--accent); font-weight: 600; }

  /* LAYOUT */
  .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; align-items: start; }
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1rem; }

  /* CARDS */
  .project-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 1.35rem; transition: border-color 0.2s, box-shadow 0.3s;
  }
  .project-card:hover { border-color: var(--accent); }
  .project-card.flash { animation: cardFlash 1.5s ease; }
  @keyframes cardFlash { 0%{box-shadow:0 0 0 2px var(--accent)} 100%{box-shadow:none} }
  .project-card.hidden { display: none; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.6rem; }
  .card-top h2 { font-size: 0.95rem; font-weight: 600; line-height: 1.3; flex: 1; margin-right: 0.75rem; }
  .badge {
    font-size: 0.6rem; font-weight: 600; padding: 0.2rem 0.55rem; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0;
  }
  .badge-healthy { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-building { background: rgba(96,165,250,0.15); color: var(--blue); }
  .badge-needs-attention { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .badge-blocked { background: rgba(248,113,113,0.15); color: var(--red); }
  .badge-planned { background: rgba(113,113,122,0.15); color: var(--muted); }
  .card-desc { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.85rem; line-height: 1.4; }
  .modules { display: flex; flex-direction: column; gap: 0.3rem; }
  .module { display: flex; align-items: center; gap: 0.5rem; font-size: 0.76rem; padding: 0.3rem 0; }
  .module-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-complete { background: var(--green); }
  .dot-in-progress { background: var(--blue); }
  .dot-planned { background: var(--muted); }
  .dot-blocked { background: var(--red); }
  .module-name { flex: 1; }
  .module-note { font-size: 0.68rem; color: var(--muted); max-width: 170px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .progress-bar { margin-top: 0.85rem; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .fill-green { background: var(--green); }
  .fill-blue { background: var(--blue); }
  .fill-yellow { background: var(--yellow); }
  .fill-red { background: var(--red); }
  .fill-gray { background: var(--muted); }
  .issues { margin-top: 0.65rem; display: flex; flex-direction: column; gap: 0.3rem; }
  .issue { font-size: 0.7rem; padding: 0.35rem 0.6rem; border-radius: 6px; line-height: 1.3; }
  .issue-critical { background: rgba(248,113,113,0.1); color: var(--red); }
  .issue-warning { background: rgba(251,191,36,0.1); color: var(--yellow); }
  .card-footer {
    margin-top: 0.85rem; padding-top: 0.65rem; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.68rem; color: var(--muted);
  }

  /* TIMELINE */
  .timeline-panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 1.25rem; position: sticky; top: 2rem; max-height: calc(100vh - 4rem); overflow-y: auto;
  }
  .timeline-panel::-webkit-scrollbar { width: 4px; }
  .timeline-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .timeline-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .timeline-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }
  .tl-item { position: relative; padding-left: 1.25rem; padding-bottom: 1rem; border-left: 1px solid var(--border); margin-left: 4px; }
  .tl-item:last-child { padding-bottom: 0; border-left-color: transparent; }
  .tl-dot { position: absolute; left: -4.5px; top: 3px; width: 8px; height: 8px; border-radius: 50%; }
  .tl-dot-launch { background: var(--green); }
  .tl-dot-milestone { background: var(--accent); }
  .tl-dot-decision { background: var(--blue); }
  .tl-dot-fix { background: var(--yellow); }
  .tl-dot-blocker { background: var(--red); }
  .tl-date { font-size: 0.65rem; color: var(--muted); margin-bottom: 0.15rem; }
  .tl-event { font-size: 0.75rem; line-height: 1.35; }

  /* TOAST */
  .toast {
    position: fixed; top: 1.5rem; right: 1.5rem; background: var(--card);
    border: 1px solid var(--accent); border-radius: 10px; padding: 0.85rem 1.15rem;
    font-size: 0.8rem; z-index: 1000; transform: translateX(120%);
    transition: transform 0.3s ease; max-width: 320px; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(0); }
  .toast-title { font-weight: 600; margin-bottom: 0.2rem; color: var(--accent); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }

  .last-updated {
    text-align: center; font-size: 0.72rem; color: var(--muted);
    margin-top: 2rem; padding-top: 1.25rem; border-top: 1px solid var(--border);
  }

  @media (max-width: 860px) {
    .main-layout { grid-template-columns: 1fr; }
    .timeline-panel { position: static; max-height: none; order: -1; }
    .projects-grid { grid-template-columns: 1fr; }
    .stats-bar { grid-template-columns: repeat(3, 1fr); }
    .hero-score { flex-direction: column; text-align: center; gap: 1.25rem; padding: 1.25rem; }
    .score-ring { width: 100px; height: 100px; }
    .score-number .value { font-size: 1.8rem; }
    .score-breakdown { justify-items: center; }
    .priority-item { font-size: 0.72rem; }
  }
  @media (max-width: 480px) {
    body { padding: 1rem; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .score-breakdown { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
  <div class="header">
    <h1><span>Signature</span> Project Tracker</h1>
    <div class="live-badge"><div class="live-dot"></div><span>Live</span></div>
  </div>

  <div id="hero-score"></div>
  <div id="priority-section"></div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="filter-bar" id="filter-bar"></div>

  <div class="main-layout">
    <div class="projects-grid" id="projects-grid"></div>
    <div class="timeline-panel">
      <div class="timeline-title">Activity Timeline</div>
      <div id="timeline-list"></div>
    </div>
  </div>

  <div class="last-updated" id="last-updated"></div>
  <div class="toast" id="toast"><div class="toast-title">Updated</div><div id="toast-msg"></div></div>

<script>
const REFRESH_INTERVAL = 30000;
let currentFilter = 'all';
let prevHash = null;

const hbMap = {'healthy':'badge-healthy','building':'badge-building','needs-attention':'badge-needs-attention','blocked':'badge-blocked','planned':'badge-planned'};
const dMap = {'complete':'dot-complete','in-progress':'dot-in-progress','planned':'dot-planned','blocked':'dot-blocked'};
const fMap = {'healthy':'fill-green','building':'fill-blue','needs-attention':'fill-yellow','blocked':'fill-red','planned':'fill-gray'};
const tMap = {'launch':'tl-dot-launch','milestone':'tl-dot-milestone','decision':'tl-dot-decision','fix':'tl-dot-fix','blocker':'tl-dot-blocker'};
const healthScore = {'healthy':100,'building':75,'needs-attention':50,'blocked':20,'planned':0};

const filterDefs = [
  {key:'all',label:'All'},
  {key:'healthy',label:'Healthy',match:p=>p.health==='healthy'},
  {key:'building',label:'Building',match:p=>p.health==='building'||p.status==='in-progress'},
  {key:'needs-attention',label:'Attention',match:p=>p.health==='needs-attention'},
  {key:'blocked',label:'Blocked',match:p=>p.health==='blocked'},
  {key:'has-issues',label:'Issues',match:p=>p.issues&&p.issues.length>0}
];

function pct(m){if(!m||!m.length)return 0;return Math.round(m.filter(x=>x.status==='complete').length/m.length*100);}
function ago(d){const days=Math.floor((new Date()-new Date(d))/86400000);if(days===0)return'Today';if(days===1)return'Yesterday';return days+'d ago';}
function toast(m){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000);}

function calcEcosystemScore(projects) {
  const scored = projects.filter(p => (p.weight || 0) > 0);
  if (!scored.length) return 0;
  let totalWeight = 0, weightedSum = 0;
  let criticals = 0, warnings = 0;
  scored.forEach(p => {
    const w = p.weight || 1;
    const hs = healthScore[p.health] || 0;
    weightedSum += hs * w;
    totalWeight += w;
    (p.issues || []).forEach(i => { if(i.severity==='critical') criticals++; else warnings++; });
  });
  const base = totalWeight > 0 ? weightedSum / totalWeight : 0;
  const penalty = (criticals * 3) + (warnings * 1);
  return Math.max(0, Math.min(100, Math.round(base - penalty)));
}

function calcPriorities(projects) {
  const scored = projects.filter(p => (p.weight || 0) > 0 && p.health !== 'healthy');
  return scored.map(p => {
    const w = p.weight || 1;
    const current = healthScore[p.health] || 0;
    const gain = ((100 - current) * w);
    const issueCount = (p.issues || []).filter(i => i.severity === 'critical').length;
    let action = '';
    if (p.health === 'blocked') action = 'UNBLOCK: ' + (p.issues?.[0]?.text || 'Remove blocker');
    else if (p.health === 'needs-attention') action = 'FIX: ' + (p.issues?.[0]?.text || 'Resolve issues & optimize');
    else if (p.health === 'building') action = 'COMPLETE: Finish active modules to reach healthy';
    return { id: p.id, name: p.name, health: p.health, gain, action, issueCount, weight: w };
  }).sort((a, b) => {
    if (a.issueCount !== b.issueCount) return b.issueCount - a.issueCount;
    return b.gain - a.gain;
  });
}

function scoreColor(score) {
  if (score >= 90) return 'var(--green)';
  if (score >= 75) return 'var(--blue)';
  if (score >= 60) return 'var(--yellow)';
  return 'var(--red)';
}

function renderHero(data) {
  const projects = data.projects;
  const score = calcEcosystemScore(projects);
  const target = data.target || 95;
  const color = scoreColor(score);
  const circ = 2 * Math.PI * 52;
  const offset = circ - (score / 100) * circ;

  const scored = projects.filter(p => (p.weight || 0) > 0);
  const counts = {
    healthy: scored.filter(p => p.health === 'healthy').length,
    building: scored.filter(p => p.health === 'building').length,
    attention: scored.filter(p => p.health === 'needs-attention').length,
    blocked: scored.filter(p => p.health === 'blocked').length
  };

  document.getElementById('hero-score').innerHTML = `
    <div class="hero-score">
      <div class="score-ring">
        <svg width="100%" height="100%" viewBox="0 0 120 120">
          <circle class="score-ring-bg" cx="60" cy="60" r="52"/>
          <circle class="score-ring-fill" cx="60" cy="60" r="52"
            stroke="${color}"
            stroke-dasharray="${circ}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="score-number">
          <div class="value" style="color:${color}">${score}</div>
          <div class="label">Health</div>
        </div>
      </div>
      <div class="score-details">
        <h2>Ecosystem Health Score</h2>
        <div class="score-breakdown">
          <div class="breakdown-item"><div class="bd-dot" style="background:var(--green)"></div><span class="bd-count">${counts.healthy}</span> Healthy</div>
          <div class="breakdown-item"><div class="bd-dot" style="background:var(--blue)"></div><span class="bd-count">${counts.building}</span> Building</div>
          <div class="breakdown-item"><div class="bd-dot" style="background:var(--yellow)"></div><span class="bd-count">${counts.attention}</span> Attention</div>
          <div class="breakdown-item"><div class="bd-dot" style="background:var(--red)"></div><span class="bd-count">${counts.blocked}</span> Blocked</div>
        </div>
        <div class="target-bar">
          <div class="target-label">Score ${score}</div>
          <div class="target-track">
            <div class="target-fill" style="width:${score}%;background:${color}"></div>
            <div class="target-marker" style="left:${target}%"></div>
          </div>
          <div class="target-label">Target ${target}</div>
        </div>
      </div>
    </div>`;
}

function renderPriorities(data) {
  const priorities = calcPriorities(data.projects);
  if (!priorities.length) {
    document.getElementById('priority-section').innerHTML = '';
    return;
  }
  const totalWeight = data.projects.filter(p=>(p.weight||0)>0).reduce((s,p)=>s+(p.weight||1),0);

  document.getElementById('priority-section').innerHTML = `
    <div class="priority-section">
      <div class="priority-title">Priority Actions to Reach ${data.target || 95}</div>
      <div class="priority-list">
        ${priorities.slice(0, 5).map((p, i) => {
          const pts = Math.round(((100 - (healthScore[p.health]||0)) * p.weight) / totalWeight);
          return `<div class="priority-item">
            <div class="priority-rank rank-${i+1}">${i+1}</div>
            <div class="priority-text"><strong>${p.name}</strong><br>${p.action}</div>
            <div class="priority-impact">+${pts} pts</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderFilters(){
  document.getElementById('filter-bar').innerHTML=filterDefs.map(f=>
    '<button class="filter-btn'+(currentFilter===f.key?' active':'')+'" data-filter="'+f.key+'">'+f.label+'</button>'
  ).join('');
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{currentFilter=btn.dataset.filter;renderFilters();applyFilter();});
  });
}
function applyFilter(){
  document.querySelectorAll('.project-card').forEach(card=>{
    if(currentFilter==='all'){card.classList.remove('hidden');return;}
    const fd=filterDefs.find(f=>f.key===currentFilter);
    const p=window._d?.projects.find(x=>x.id===card.dataset.id);
    if(p&&fd?.match)card.classList.toggle('hidden',!fd.match(p));
    else card.classList.remove('hidden');
  });
}

function render(data){
  window._d=data;
  const P=data.projects;

  renderHero(data);
  renderPriorities(data);

  const total=P.length,act=P.filter(p=>p.status==='active').length,bld=P.filter(p=>p.status==='in-progress'||p.health==='building').length;
  const blk=P.filter(p=>p.health==='blocked').length,att=P.filter(p=>p.health==='needs-attention').length;
  const tM=P.reduce((s,p)=>s+(p.modules?.length||0),0),dM=P.reduce((s,p)=>s+(p.modules?.filter(m=>m.status==='complete').length||0),0);

  document.getElementById('stats-bar').innerHTML=
    '<div class="stat"><div class="stat-value">'+total+'</div><div class="stat-label">Total</div></div>'+
    '<div class="stat"><div class="stat-value" style="color:var(--green)">'+act+'</div><div class="stat-label">Active</div></div>'+
    '<div class="stat"><div class="stat-value" style="color:var(--blue)">'+bld+'</div><div class="stat-label">Building</div></div>'+
    '<div class="stat"><div class="stat-value" style="color:var(--yellow)">'+att+'</div><div class="stat-label">Attention</div></div>'+
    '<div class="stat"><div class="stat-value" style="color:var(--red)">'+blk+'</div><div class="stat-label">Blocked</div></div>'+
    '<div class="stat"><div class="stat-value" style="color:var(--accent)">'+dM+'/'+tM+'</div><div class="stat-label">Modules</div></div>';

  document.getElementById('projects-grid').innerHTML=P.map(p=>{
    const pc=pct(p.modules);
    return '<div class="project-card" data-id="'+p.id+'">'+
      '<div class="card-top"><h2>'+p.name+'</h2><span class="badge '+(hbMap[p.health]||'badge-planned')+'">'+(p.health||'').replace(/-/g,' ')+'</span></div>'+
      '<div class="card-desc">'+p.description+'</div>'+
      '<div class="modules">'+(p.modules||[]).map(m=>
        '<div class="module"><div class="module-dot '+(dMap[m.status]||'dot-planned')+'"></div><div class="module-name">'+m.name+'</div><div class="module-note" title="'+(m.note||'')+'">'+(m.note||'')+'</div></div>'
      ).join('')+'</div>'+
      '<div class="progress-bar"><div class="progress-fill '+(fMap[p.health]||'fill-gray')+'" style="width:'+pc+'%"></div></div>'+
      ((p.issues||[]).length?'<div class="issues">'+p.issues.map(i=>'<div class="issue issue-'+i.severity+'">'+i.text+'</div>').join('')+'</div>':'')+
      '<div class="card-footer"><span>'+pc+'% complete</span><span>'+ago(p.lastActivity)+'</span></div></div>';
  }).join('');

  const tl=(data.timeline||[]).sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('timeline-list').innerHTML=tl.map(t=>
    '<div class="tl-item"><div class="tl-dot '+(tMap[t.type]||'tl-dot-milestone')+'"></div>'+
    '<div class="tl-date">'+new Date(t.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div>'+
    '<div class="tl-event">'+t.event+'</div></div>'
  ).join('');

  const u=new Date(data.lastUpdated);
  document.getElementById('last-updated').textContent='Updated by '+data.updatedBy+' \u2014 '+u.toLocaleString();
  applyFilter();
}

async function load(){
  try{
    const r=await fetch('projects.json?'+Date.now());
    const d=await r.json();
    const h=JSON.stringify(d);
    if(prevHash&&h!==prevHash){toast('Dashboard updated');setTimeout(()=>{document.querySelectorAll('.project-card').forEach(c=>{c.classList.add('flash');setTimeout(()=>c.classList.remove('flash'),1500);});},100);}
    prevHash=h;
    render(d);
  }catch(e){console.error('Load failed:',e);}
}
renderFilters();
load();
setInterval(load,REFRESH_INTERVAL);
</script>
</body>
</html>
